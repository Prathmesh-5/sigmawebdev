<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN FORM</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="box">
        
        <form>
            <h1 class="heading">Login</h1>

            <div class="x1">
            <label for="username" style="display: block;" class="username">Username</label>
            <input type="text" placeholder="👤Enter your username" id="username" name="userName" style="display: block;">
            </div>

            <div class="x2">
                <label for="email" style="display: block;" class="email" >Email Id</label>
                <input type="text" name="userEmail" id="email" placeholder="📧eg.. abc@xyz.com" style="display: block;">
            </div>

            <div class="x3">
            <label for="userpaswd" style="display: block;" class="userpaswd">Password</label>
            <input type="password" id="userpaswd" placeholder="🔑Enter your password" name="userPassword" style="display: block;">
            </div>

            <button style="width: 100%;">Login</button>

        </form>



    </div>
    
    

</body>
</html>
